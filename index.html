<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ee4d2d, #ff7849);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }
        h1 { 
            color: #ee4d2d; 
            font-size: 24px; 
            margin-bottom: 8px;
            font-weight: 700;
        }
        .sub { 
            color: #888; 
            font-size: 14px; 
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }
        .input-row input:focus { 
            border-color: #ee4d2d;
        }
        .paste-btn {
            padding: 12px 14px;
            background: #555;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .paste-btn:active { 
            opacity: 0.7;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-appearance: none;
            font-family: inherit;
        }
        button:hover { 
            opacity: 0.9;
        }
        button:active { 
            opacity: 0.7;
        }
        .gen { 
            background: #ee4d2d; 
            color: #fff;
        }
        .copy { 
            background: #28a745; 
            color: #fff; 
            display: none;
        }
        .launch { 
            background: #1a73e8; 
            color: #fff; 
            display: none;
        }
        .result {
            margin-top: 16px;
            padding: 14px;
            background: #f7f7f7;
            border-radius: 8px;
            word-break: break-all;
            font-size: 13px;
            display: none;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
        }
        .result strong {
            display: block;
            color: #333;
            margin-bottom: 8px;
        }
        .result a { 
            color: #ee4d2d; 
            text-decoration: none;
            font-weight: 500;
        }
        .err { 
            color: #d32f2f; 
            font-size: 13px; 
            margin-top: 8px; 
            display: none;
            padding: 10px;
            background: #ffebee;
            border-radius: 6px;
            border-left: 3px solid #d32f2f;
        }
        .loading { 
            color: #ee4d2d; 
            font-size: 13px; 
            margin-top: 8px; 
            display: none;
            padding: 10px;
            background: #fff3e0;
            border-radius: 6px;
            border-left: 3px solid #ee4d2d;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🛒 Tạo Link Mua Hàng</h1>
    <p class="sub">Dán link sản phẩm Shopee để tạo link ưu đãi</p>

    <div class="input-row">
        <input type="text" id="url" placeholder="https://vn.shp.ee/... hoặc shopee.vn/..." autofocus />
        <button class="paste-btn" onclick="pasteLink()">📋 Dán</button>
    </div>

    <div class="button-group">
        <button class="gen" onclick="generate()">Tạo Link</button>
    </div>

    <div class="loading" id="loading">⏳ Đang xử lý...</div>
    <div class="err" id="err"></div>

    <div class="result" id="result">
        <strong>✅ Link mua hàng:</strong>
        <a id="link" href="#" target="_blank"></a>
    </div>

    <div class="button-group" style="display: none;" id="actionButtons">
        <button class="copy" id="copyBtn" onclick="copy()">📋 Copy Link</button>
        <button class="launch" id="launchBtn" onclick="launch()">🚀 Mở Link</button>
    </div>
</div>

<script>
    const AFFILIATE_ID = '17300270505';

    function extractUrl(text) {
        var match = text.match(/https?:\/\/[^\s]+/);
        return match ? match[0] : text;
    }

    function parseShopeeUrl(raw) {
        try {
            var url = new URL(raw);
            var host = url.hostname;
            if (!/shopee\.(vn|co\.th|sg|com\.my|co\.id|ph|tw|com|cl|com\.co|com\.mx|kr|in|pl|com\.br)/.test(host)) return null;
            var path = url.pathname;
            var m = path.match(/i\.(\d+)\.(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2], host: host };
            m = path.match(/\/product\/(\d+)\/(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2], host: host };
            m = path.match(/\/[^\/]+\/(\d+)\/(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2], host: host };
            return null;
        } catch (e) { return null; }
    }

    function isShortShopeeUrl(url) {
        try {
            var parsed = new URL(url);
            var host = parsed.hostname;
            return /shp\.ee$/.test(host);
        } catch (e) {
            return false;
        }
    }

    function isShopeeUrl(url) {
        try {
            var parsed = new URL(url);
            var host = parsed.hostname;
            return /shopee\.(vn|co\.th|sg|com\.my|co\.id|ph|tw|com|cl|com\.co|com\.mx|kr|in|pl|com\.br)/.test(host) 
                   || isShortShopeeUrl(url);
        } catch (e) {
            return false;
        }
    }

    async function resolveShortUrl(shortUrl) {
        try {
            // Use a CORS proxy to resolve the redirect
            const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(shortUrl), {
                method: 'GET'
            });
            const html = await response.text();
            // Try to extract product URL from redirected page
            var match = html.match(/https:\/\/shopee\.[^"<>\s]+/);
            return match ? match[0] : shortUrl;
        } catch (e) {
            console.log('Could not resolve, using as-is');
            return shortUrl;
        }
    }

    async function generate() {
        var raw = extractUrl(document.getElementById('url').value.trim());
        var errEl = document.getElementById('err');
        var loadingEl = document.getElementById('loading');
        var resultEl = document.getElementById('result');
        var actionButtons = document.getElementById('actionButtons');

        errEl.style.display = 'none';
        loadingEl.style.display = 'none';
        resultEl.style.display = 'none';
        actionButtons.style.display = 'none';

        if (!raw) {
            errEl.textContent = '⚠️ Vui lòng dán link sản phẩm Shopee';
            errEl.style.display = 'block';
            return;
        }

        if (!isShopeeUrl(raw)) {
            errEl.textContent = '⚠️ Link không hợp lệ. Vui lòng dán link từ Shopee (shopee.vn, s.shopee.vn, vn.shp.ee...)';
            errEl.style.display = 'block';
            return;
        }

        var originLink = raw;
        var parsed = parseShopeeUrl(raw);

        if (isShortShopeeUrl(raw) && !parsed) {
            loadingEl.style.display = 'block';
            try {
                var resolvedUrl = await resolveShortUrl(raw);
                parsed = parseShopeeUrl(resolvedUrl);
                if (parsed) {
                    originLink = 'https://' + parsed.host + '/product/' + parsed.shopId + '/' + parsed.itemId;
                } else {
                    originLink = resolvedUrl || raw;
                }
            } catch (e) {
                console.error('Error:', e);
                originLink = raw;
            }
            loadingEl.style.display = 'none';
        } else if (parsed) {
            originLink = 'https://' + parsed.host + '/product/' + parsed.shopId + '/' + parsed.itemId;
        }

        var affLink = 'https://s.shopee.vn/an_redir'
            + '?origin_link=' + encodeURIComponent(originLink)
            + '&share_channel_code=4'
            + '&affiliate_id=' + AFFILIATE_ID;

        var linkEl = document.getElementById('link');
        linkEl.href = affLink;
        linkEl.textContent = affLink;
        resultEl.style.display = 'block';
        actionButtons.style.display = 'flex';
    }

    function pasteLink() {
        var input = document.getElementById('url');
        if (navigator.clipboard && navigator.clipboard.readText) {
            navigator.clipboard.readText().then(function(text) {
                input.value = text;
                input.focus();
            }).catch(function() {
                input.focus();
            });
        } else {
            input.focus();
        }
    }

    function launch() {
        var url = document.getElementById('link').href;
        if (url && url !== '#') {
            window.open(url, '_blank');
        }
    }

    function copy() {
        var text = document.getElementById('link').textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                var btn = document.getElementById('copyBtn');
                btn.textContent = '✅ Đã copy!';
                setTimeout(function() { btn.textContent = '📋 Copy Link'; }, 2000);
            });
        } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            ta.setSelectionRange(0, ta.value.length);
            document.execCommand('copy');
            document.body.removeChild(ta);
            var btn = document.getElementById('copyBtn');
            btn.textContent = '✅ Đã copy!';
            setTimeout(function() { btn.textContent = '📋 Copy Link'; }, 2000);
        }
    }

    document.getElementById('url').addEventListener('keydown', e => {
        if (e.key === 'Enter') generate();
    });
</script>
</body>
</html>
