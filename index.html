<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Tool PRO</title>

<style>
body { font-family: sans-serif; background:#ee4d2d; padding:20px; }
.box { background:#fff; padding:20px; border-radius:12px; max-width:480px; margin:auto; }
input,button {
    width:100%; padding:12px; margin-top:10px;
    border-radius:8px; border:1px solid #ccc;
}
button { background:#ee4d2d; color:#fff; border:none; font-weight:bold; }
.history div {
    background:#f5f5f5; padding:8px; margin-top:5px;
    border-radius:6px; font-size:13px; word-break:break-all;
}
</style>
</head>

<body>

<div class="box">
<h2>🛒 Shopee Tool PRO</h2>

<input id="url" placeholder="Dán link Shopee">

<button id="genBtn">Tạo link</button>

<input id="result" readonly placeholder="Link affiliate">

<button id="copyBtn">📋 Copy</button>
<button id="openBtn">🚀 Mở link</button>

<div id="history"></div>
</div>

<script>
const AFFILIATE_ID = '17300270505';

const SHORT_DOMAINS = ['shp.ee','shpee.cc','sp.run','sho.pe','s.shopee.vn'];

function extractUrl(text){
    let m = text.match(/https?:\/\/[^\s]+/);
    return m ? m[0] : text;
}

function parseShopee(url){
    try{
        let u = new URL(url);

        if(SHORT_DOMAINS.some(d => u.hostname.includes(d))){
            return url;
        }

        let m = u.pathname.match(/i\.(\d+)\.(\d+)/);
        if(m){
            return `https://${u.hostname}/product/${m[1]}/${m[2]}`;
        }

        m = u.pathname.match(/\/product\/(\d+)\/(\d+)/);
        if(m){
            return `https://${u.hostname}/product/${m[1]}/${m[2]}`;
        }

        m = u.pathname.match(/\/[^\/]+\/(\d+)\/(\d+)/);
        if(m){
            return `https://${u.hostname}/product/${m[1]}/${m[2]}`;
        }

        return url;
    }catch{
        return url;
    }
}

function generate(){
    try{
        let raw = document.getElementById('url').value.trim();
        if(!raw) return;

        raw = extractUrl(raw);

        let clean = parseShopee(raw);

        let aff = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(clean)}&affiliate_id=${AFFILIATE_ID}`;

        document.getElementById('result').value = aff;

        saveHistory(aff);
    }catch(e){
        alert("Lỗi: " + e.message);
    }
}

function copy(){
    let input = document.getElementById('result');
    if(!input.value) return;

    input.removeAttribute("readonly");
    input.select();
    input.setSelectionRange(0,99999);

    document.execCommand("copy");

    input.setAttribute("readonly", true);

    alert("✅ Đã copy");
}

function openLink(){
    let link = document.getElementById('result').value;
    if(link){
        window.open(link,'_blank');
    }
}

// ===== HISTORY =====
function saveHistory(link){
    let list = JSON.parse(localStorage.getItem("history")||"[]");
    list.unshift(link);
    list = list.slice(0,10);
    localStorage.setItem("history", JSON.stringify(list));
    renderHistory();
}

function renderHistory(){
    let list = JSON.parse(localStorage.getItem("history")||"[]");
    let container = document.getElementById("history");
    container.innerHTML = "<b>🕘 Lịch sử:</b>";

    list.forEach(l=>{
        let div = document.createElement("div");
        div.textContent = l;
        div.onclick = ()=>{ document.getElementById("result").value = l; };
        container.appendChild(div);
    });
}

// ===== EVENTS (FIX iOS) =====
document.getElementById("genBtn").addEventListener("click", generate);
document.getElementById("copyBtn").addEventListener("click", copy);
document.getElementById("openBtn").addEventListener("click", openLink);

document.getElementById("url").addEventListener("keydown", e=>{
    if(e.key === "Enter") generate();
});

renderHistory();
</script>

</body>
</html>
