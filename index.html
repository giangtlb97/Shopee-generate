<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ee4d2d, #ff7849);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }
        h1 { color: #ee4d2d; font-size: 22px; margin-bottom: 6px; }
        .sub { color: #888; font-size: 13px; margin-bottom: 20px; }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .input-row input:focus { border-color: #ee4d2d; }
        .paste-btn {
            width: auto;
            padding: 14px 16px;
            background: #555;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none;
            white-space: nowrap;
        }
        .paste-btn:active { opacity: 0.7; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #ee4d2d; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.2s;
            -webkit-appearance: none;
        }
        button:hover { opacity: 0.9; }
        button:active { opacity: 0.7; }
        .gen { background: #ee4d2d; color: #fff; }
        .copy { background: #28a745; color: #fff; display: none; }
        .launch { background: #1a73e8; color: #fff; display: none; }
        .result {
            margin-top: 16px;
            padding: 14px;
            background: #f7f7f7;
            border-radius: 10px;
            word-break: break-all;
            font-size: 13px;
            display: none;
            line-height: 1.6;
        }
        .result a { color: #ee4d2d; text-decoration: none; }
        .err { color: #e53935; font-size: 13px; margin-top: 8px; display: none; }
    </style>
</head>
<body>
<div class="box">
    <h1>🛒 Tạo Link Mua Hàng</h1>
    <p class="sub">Dán link sản phẩm Shopee vào đây để lấy link ưu đãi</p>

    <div class="input-row">
        <input type="text" id="url" placeholder="Dán link Shopee vào đây..." autofocus />
        <button class="paste-btn" onclick="pasteLink()">📋 Dán</button>
    </div>

    <button class="gen" onclick="generate()">Tạo Link</button>
    <div class="err" id="err"></div>

    <div class="result" id="result">
        <strong>Link mua hàng:</strong><br>
        <a id="link" href="#" target="_blank"></a>
    </div>
    <button class="copy" id="copyBtn" onclick="copy()">📋 Copy Link</button>
    <button class="launch" id="launchBtn" onclick="launch()">🚀 Mở Link</button>
</div>

<script>
    // ===== YOUR AFFILIATE ID HERE =====
    const AFFILIATE_ID = '17300270505';
    // ==================================

    // Extract a URL from pasted text (Shopee app often shares extra text around the link)
    function extractUrl(text) {
        var match = text.match(/https?:\/\/[^\s]+/);
        return match ? match[0] : text;
    }

    function parseShopeeUrl(raw) {
        try {
            var url = new URL(raw);
            var host = url.hostname;
            if (!/shopee\.(vn|co\.th|sg|com\.my|co\.id|ph|tw|com|cl|com\.co|com\.mx|kr|in|pl|com\.br)/.test(host)) return null;
            var path = url.pathname;
            // i.{shopId}.{itemId}
            var m = path.match(/i\.(\d+)\.(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2], host: host };
            // /product/{shopId}/{itemId}
            m = path.match(/\/product\/(\d+)\/(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2], host: host };
            // /{username}/{shopId}/{itemId}  (redirect format)
            m = path.match(/\/[^\/]+\/(\d+)\/(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2], host: host };
            return null;
        } catch (e) { return null; }
    }

    function pasteLink() {
        var input = document.getElementById('url');
        if (navigator.clipboard && navigator.clipboard.readText) {
            navigator.clipboard.readText().then(function(text) {
                input.value = text;
                generate();
            }).catch(function() {
                input.focus();
            });
        } else {
            input.focus();
        }
    }

    function isShopeeUrl(url) {
        try {
            var parsed = new URL(url);
            var host = parsed.hostname;
            return /^(s\.|[\w-]+\.)?shopee\.(vn|co\.th|sg|com\.my|co\.id|ph|tw|com|cl|com\.co|com\.mx|kr|in|pl|com\.br)$/.test(host);
        } catch (e) {
            return false;
        }
    }

    function generate() {
        var raw = extractUrl(document.getElementById('url').value.trim());
        var errEl = document.getElementById('err');
        var resultEl = document.getElementById('result');
        var copyBtn = document.getElementById('copyBtn');
        var launchBtn = document.getElementById('launchBtn');

        errEl.style.display = 'none';
        resultEl.style.display = 'none';
        copyBtn.style.display = 'none';
        launchBtn.style.display = 'none';

        if (!raw) {
            errEl.textContent = '⚠️ Vui lòng dán link sản phẩm Shopee.';
            errEl.style.display = 'block';
            return;
        }

        if (!isShopeeUrl(raw)) {
            errEl.textContent = '⚠️ Link không hợp lệ. Chỉ hỗ trợ link từ Shopee (shopee.vn, s.shopee.vn...)';
            errEl.style.display = 'block';
            return;
        }

        // If it's a short link (s.shopee.vn), use it directly as origin_link
        var originLink = raw;
        var parsed = parseShopeeUrl(raw);
        if (parsed) {
            // Normalize to clean format
            originLink = 'https://' + parsed.host + '/product/' + parsed.shopId + '/' + parsed.itemId;
        }

        var affLink = 'https://s.shopee.vn/an_redir'
            + '?origin_link=' + encodeURIComponent(originLink)
            + '&share_channel_code=4'
            + '&affiliate_id=' + AFFILIATE_ID;

        var linkEl = document.getElementById('link');
        linkEl.href = affLink;
        linkEl.textContent = affLink;
        resultEl.style.display = 'block';
        copyBtn.style.display = 'block';
        launchBtn.style.display = 'block';
    }

    function launch() {
        var url = document.getElementById('link').href;
        if (url && url !== '#') {
            window.open(url, '_blank');
        }
    }

    function copy() {
        var text = document.getElementById('link').textContent;
        // iOS Safari fallback: use a temporary textarea + execCommand
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        document.execCommand('copy');
        document.body.removeChild(ta);
        var btn = document.getElementById('copyBtn');
        btn.textContent = '✅ Đã copy!';
        setTimeout(function() { btn.textContent = '📋 Copy Link'; }, 2000);
    }

    // Allow Enter key to generate
    document.getElementById('url').addEventListener('keydown', e => {
        if (e.key === 'Enter') generate();
    });
</script>
</body>
</html>
