<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Tool PRO</title>

<style>
body {
    font-family: sans-serif;
    background: #ee4d2d;
    padding: 20px;
}
.box {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    max-width: 480px;
    margin: auto;
}
h2 { margin-bottom: 10px; }

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #ee4d2d;
    color: #fff;
    border: none;
    font-weight: bold;
}

.result {
    margin-top: 10px;
}

.history {
    margin-top: 15px;
    font-size: 13px;
}
.history div {
    background: #f5f5f5;
    padding: 8px;
    margin-top: 5px;
    border-radius: 6px;
    word-break: break-all;
}
</style>
</head>

<body>

<div class="box">
<h2>🛒 Shopee Tool PRO</h2>

<input id="url" placeholder="Dán link Shopee">

<button onclick="generate()">Tạo link</button>

<input id="result" readonly placeholder="Link affiliate">

<button onclick="copy()">📋 Copy</button>
<button onclick="openLink()">🚀 Mở link</button>

<div class="history" id="history"></div>
</div>

<script>
const AFFILIATE_ID = '17300270505';

const SHORT_DOMAINS = ['shp.ee','shpee.cc','sp.run','sho.pe','s.shopee.vn'];

function extractUrl(text) {
    let m = text.match(/https?:\/\/[^\s]+/);
    return m ? m[0] : text;
}

function parseShopee(url) {
    try {
        let u = new URL(url);

        if (SHORT_DOMAINS.some(d => u.hostname.includes(d))) {
            return url;
        }

        let m = u.pathname.match(/(\\d+)\\.(\\d+)|(\\d+)\\/(\\d+)$/);

        if (m) {
            let shop = m[1] || m[3];
            let item = m[2] || m[4];
            return `https://${u.hostname}/product/${shop}/${item}`;
        }

        return url;
    } catch {
        return url;
    }
}

function generate() {
    let raw = extractUrl(document.getElementById('url').value.trim());
    if (!raw) return;

    let clean = parseShopee(raw);

    let aff = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(clean)}&affiliate_id=${AFFILIATE_ID}`;

    document.getElementById('result').value = aff;

    saveHistory(aff);
}

function copy() {
    let input = document.getElementById('result');

    input.removeAttribute("readonly");
    input.select();
    input.setSelectionRange(0, 99999);

    document.execCommand("copy");

    input.setAttribute("readonly", true);

    alert("✅ Đã copy");
}

function openLink() {
    let link = document.getElementById('result').value;
    if (link) window.open(link, "_blank");
}

// ===== HISTORY =====
function saveHistory(link) {
    let list = JSON.parse(localStorage.getItem("history") || "[]");
    list.unshift(link);
    list = list.slice(0, 10);
    localStorage.setItem("history", JSON.stringify(list));
    renderHistory();
}

function renderHistory() {
    let list = JSON.parse(localStorage.getItem("history") || "[]");
    let html = "<b>🕘 Lịch sử:</b>";

    list.forEach(l => {
        html += `<div onclick="useHistory('${l}')">${l}</div>`;
    });

    document.getElementById("history").innerHTML = html;
}

function useHistory(link) {
    document.getElementById("result").value = link;
}

// Enter key
document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
});

renderHistory();
</script>

</body>
</html>
