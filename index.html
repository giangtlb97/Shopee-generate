<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ee4d2d, #ff7849);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }
        h1 { 
            color: #ee4d2d; 
            font-size: 24px; 
            margin-bottom: 8px;
            font-weight: 700;
        }
        .sub { 
            color: #888; 
            font-size: 14px; 
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }
        .input-row input:focus { 
            border-color: #ee4d2d;
        }
        .paste-btn {
            padding: 12px 14px;
            background: #555;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .paste-btn:active { 
            opacity: 0.7;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .button-row {
            display: flex;
            gap: 8px;
        }
        .button-row button {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-appearance: none;
            font-family: inherit;
        }
        button:hover { 
            opacity: 0.9;
        }
        button:active { 
            opacity: 0.7;
        }
        .gen { 
            background: #ee4d2d; 
            color: #fff;
        }
        .gen:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .copy { 
            background: #28a745; 
            color: #fff; 
            display: none;
        }
        .launch { 
            background: #1a73e8; 
            color: #fff; 
            display: none;
        }
        .result {
            margin-top: 16px;
            padding: 14px;
            background: #f7f7f7;
            border-radius: 8px;
            word-break: break-all;
            font-size: 12px;
            display: none;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
            max-height: 100px;
            overflow-y: auto;
        }
        .result strong {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .result a { 
            color: #ee4d2d; 
            text-decoration: none;
            font-weight: 500;
        }
        .err { 
            color: #d32f2f; 
            font-size: 13px; 
            margin-top: 8px; 
            display: none;
            padding: 10px;
            background: #ffebee;
            border-radius: 6px;
            border-left: 3px solid #d32f2f;
        }
        .action-buttons {
            display: none;
            gap: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🛒 Tạo Link Mua Hàng</h1>
    <p class="sub">Dán link sản phẩm Shopee để tạo link ưu đãi</p>

    <div class="input-row">
        <input type="text" id="url" placeholder="https://shopee.vn/... hoặc vn.shp.ee/..." autofocus />
        <button class="paste-btn" onclick="pasteLink()">📋 Dán</button>
    </div>

    <div class="button-group">
        <button class="gen" id="genBtn" onclick="generate()">Tạo Link</button>
    </div>

    <div class="err" id="err"></div>

    <div class="result" id="result">
        <strong>✅ Link được tạo:</strong>
        <a id="link" href="#" target="_blank"></a>
    </div>

    <div class="action-buttons" id="actionButtons">
        <button class="copy" id="copyBtn" onclick="copy()">📋 Copy</button>
        <button class="launch" id="launchBtn" onclick="launch()">🚀 Mở App</button>
    </div>
</div>

<script>
    const AFFILIATE_ID = '17300270505';
    let currentAffLink = '';

    function extractUrl(text) {
        var match = text.match(/https?:\/\/[^\s]+/);
        return match ? match[0] : text;
    }

    function parseShopeeUrl(raw) {
        try {
            var url = new URL(raw);
            var path = url.pathname;
            
            // Match shop ID and item ID from various URL formats
            // Format: /i.{shopId}.{itemId}
            var m = path.match(/i\.(\d+)\.(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2] };
            
            // Format: /product/{shopId}/{itemId}
            m = path.match(/\/product\/(\d+)\/(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2] };
            
            // Format: /{username}/{shopId}/{itemId}
            m = path.match(/\/[^\/]+\/(\d+)\/(\d+)/);
            if (m) return { shopId: m[1], itemId: m[2] };
            
            return null;
        } catch (e) { 
            return null; 
        }
    }

    function isShopeeUrl(url) {
        try {
            var parsed = new URL(url);
            var host = parsed.hostname;
            // Accept both shopee domains and shp.ee short links
            return /shopee\.(vn|co\.th|sg|com\.my|co\.id|ph|tw|com|cl|com\.co|com\.mx|kr|in|pl|com\.br)/.test(host) 
                   || /shp\.ee$/.test(host);
        } catch (e) {
            return false;
        }
    }

    function generate() {
        var raw = extractUrl(document.getElementById('url').value.trim());
        var errEl = document.getElementById('err');
        var resultEl = document.getElementById('result');
        var actionButtons = document.getElementById('actionButtons');

        errEl.style.display = 'none';
        resultEl.style.display = 'none';
        actionButtons.style.display = 'none';

        if (!raw) {
            errEl.textContent = '⚠️ Vui lòng dán link sản phẩm Shopee';
            errEl.style.display = 'block';
            return;
        }

        if (!isShopeeUrl(raw)) {
            errEl.textContent = '⚠️ Link không hợp lệ. Vui lòng dán link từ Shopee';
            errEl.style.display = 'block';
            return;
        }

        var originLink = raw;
        var parsed = parseShopeeUrl(raw);

        // If we can parse the URL to get shopId and itemId, use normalized format
        if (parsed) {
            originLink = 'https://shopee.vn/product/' + parsed.shopId + '/' + parsed.itemId;
        }

        // Create affiliate link INSTANTLY
        currentAffLink = 'https://s.shopee.vn/an_redir'
            + '?origin_link=' + encodeURIComponent(originLink)
            + '&share_channel_code=4'
            + '&affiliate_id=' + AFFILIATE_ID;

        var linkEl = document.getElementById('link');
        linkEl.href = currentAffLink;
        linkEl.textContent = currentAffLink;
        resultEl.style.display = 'block';
        actionButtons.style.display = 'flex';
    }

    function pasteLink() {
        var input = document.getElementById('url');
        if (navigator.clipboard && navigator.clipboard.readText) {
            navigator.clipboard.readText().then(function(text) {
                input.value = text.trim();
                input.focus();
            }).catch(function() {
                input.focus();
            });
        } else {
            input.focus();
        }
    }

    function launch() {
        if (currentAffLink) {
            // Try to open Shopee app with deep link
            var deepLink = currentAffLink.replace('https://s.shopee.vn/an_redir', 'shopee://');
            
            // Try opening the deep link
            window.location.href = deepLink;
            
            // Fallback to web if app is not installed (after a short delay)
            setTimeout(function() {
                window.open(currentAffLink, '_blank');
            }, 500);
        }
    }

    function copy() {
        if (!currentAffLink) return;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(currentAffLink).then(() => {
                showCopySuccess();
            }).catch(() => {
                fallbackCopy(currentAffLink);
            });
        } else {
            fallbackCopy(currentAffLink);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
            document.execCommand('copy');
            showCopySuccess();
        } catch (e) {
            console.error('Copy failed:', e);
        }
        document.body.removeChild(ta);
    }

    function showCopySuccess() {
        var btn = document.getElementById('copyBtn');
        var originalText = btn.textContent;
        btn.textContent = '✅ Đã copy!';
        setTimeout(function() { 
            btn.textContent = '📋 Copy'; 
        }, 2000);
    }

    document.getElementById('url').addEventListener('keydown', e => {
        if (e.key === 'Enter') generate();
    });
</script>
</body>
</html>
